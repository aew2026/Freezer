<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FrostTrack">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>FrostTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-header__title">FrostTrack</h1>
      <button class="btn btn--icon gear-btn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <main class="tab-content">
      <section id="tab-home"      class="tab-panel" data-tab="home"></section>
      <section id="tab-inventory" class="tab-panel" data-tab="inventory"></section>
      <section id="tab-add"       class="tab-panel" data-tab="add"></section>
      <section id="tab-shopping"  class="tab-panel" data-tab="shopping"></section>
      <section id="tab-meals"     class="tab-panel" data-tab="meals"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="bottom-nav__item" data-tab="home">
        <span class="bottom-nav__icon">🏠</span>
        <span class="bottom-nav__label">Home</span>
      </button>
      <button class="bottom-nav__item" data-tab="inventory">
        <span class="bottom-nav__icon">🧊</span>
        <span class="bottom-nav__label">Inventory</span>
      </button>
      <button class="bottom-nav__item bottom-nav__add" data-tab="add">
        <span class="bottom-nav__icon">＋</span>
        <span class="bottom-nav__label">Add</span>
      </button>
      <button class="bottom-nav__item" data-tab="shopping">
        <span class="bottom-nav__icon">🛒</span>
        <span class="bottom-nav__label">Shopping</span>
      </button>
      <button class="bottom-nav__item" data-tab="meals">
        <span class="bottom-nav__icon">🍽️</span>
        <span class="bottom-nav__label">Meals</span>
      </button>
    </nav>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <div class="bottom-sheet" id="bottomSheet" aria-modal="true" role="dialog" aria-label="Edit item"></div>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  </div>

  <div class="settings-overlay" id="settingsOverlay"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
